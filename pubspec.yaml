name: bluetalk
description: "BlueTalk - Voice communication platform for gamers"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Navigation
  go_router: ^14.2.0
  
  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  
  # Supabase
  google_sign_in: ^6.2.1
  
  # Google Fonts
  google_fonts: ^6.2.1
  
  # Image handling
  cached_network_image: ^3.3.1
  image_picker: ^1.1.2
  
  # Animations
  flutter_animate: ^4.5.0
  
  # Utils
  intl: ^0.19.0
  share_plus: ^9.0.0
  url_launcher: ^6.3.2
  uuid: ^4.4.0
  
  # Permissions
  permission_handler: ^11.3.1
  
  # Emoji
  shared_preferences: ^2.5.4
  firebase_core: ^3.4.0
  firebase_messaging: ^15.1.0
  flutter_local_notifications: ^17.2.3
  connectivity_plus: ^7.0.0
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.2.0
  app_links: ^6.4.1
  font_awesome_flutter: ^10.12.0
  firebase_auth: ^5.2.0
  cloud_firestore: ^5.4.0
  firebase_storage: ^12.2.0
  http: ^1.6.0
  image: ^4.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.3
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/logo.png
    - assets/images/foreground_logo.png
    - assets/images/google_logo.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  adaptive_icon_background: "#0053d4"
  adaptive_icon_foreground: "assets/images/foreground_logo.png"
  min_sdk_android: 21
